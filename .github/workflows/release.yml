name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
            archive: zip
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../proxelar-${{ github.ref_name }}-${{ matrix.target }}.tar.gz proxelar
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/proxelar.exe" -DestinationPath "proxelar-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: proxelar-${{ matrix.target }}
          path: proxelar-${{ github.ref_name }}-${{ matrix.target }}.*

  # Windows build that links a shared lua54.dll instead of vendoring Lua, so
  # scripts run with --allow-c-modules can `require` native modules (e.g.
  # lua-protobuf). The DLL is bundled alongside the executable.
  build-windows-cmodules:
    name: Build (x86_64-pc-windows-msvc, C modules)
    runs-on: windows-latest
    env:
      LUA_VERSION: "5.4.8"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc-cmodules

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build shared lua54.dll
        shell: cmd
        run: |
          curl -L -o lua.tar.gz https://www.lua.org/ftp/lua-%LUA_VERSION%.tar.gz || exit /b 1
          tar -xzf lua.tar.gz || exit /b 1
          cd lua-%LUA_VERSION%\src
          cl /nologo /MD /O2 /c /DLUA_BUILD_AS_DLL *.c || exit /b 1
          del lua.obj luac.obj
          link /nologo /DLL /IMPLIB:lua54.lib /OUT:lua54.dll *.obj || exit /b 1

      - name: Build (native)
        shell: cmd
        run: |
          rem mlua-sys links against LUA_LIB_NAME in LUA_LIB; the C glue finds
          rem lua.h via cl.exe's INCLUDE path, so prepend the Lua source dir.
          set INCLUDE=%CD%\lua-%LUA_VERSION%\src;%INCLUDE%
          set LUA_LIB=%CD%\lua-%LUA_VERSION%\src
          set LUA_LIB_NAME=lua54
          cargo build --release --locked --no-default-features --features scripting --target x86_64-pc-windows-msvc

      - name: Package
        shell: pwsh
        run: |
          $staging = "proxelar-cmodules"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/proxelar.exe" $staging
          Copy-Item "lua-$env:LUA_VERSION/src/lua54.dll" $staging
          Compress-Archive -Path "$staging/*" -DestinationPath "proxelar-${{ github.ref_name }}-x86_64-pc-windows-msvc-cmodules.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: proxelar-x86_64-pc-windows-msvc-cmodules
          path: proxelar-${{ github.ref_name }}-x86_64-pc-windows-msvc-cmodules.zip

  release:
    name: Create release
    needs: [build, build-windows-cmodules]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: cliff.toml
          args: --latest --strip header

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: artifacts/*
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish proxyapi_models
        run: cargo publish -p proxyapi_models --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish proxyapi
        run: cargo publish -p proxyapi --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish proxelar
        run: cargo publish -p proxelar --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    name: Bump Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.ref_name, '-')"
    steps:
      - uses: mislav/bump-homebrew-formula-action@v4.1
        with:
          formula-name: proxelar
          homebrew-tap: Homebrew/homebrew-core
          download-url: https://github.com/emanuele-em/proxelar/archive/refs/tags/${{ github.ref_name }}.tar.gz
          create-pullrequest: true
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_CORE_TOKEN }}
