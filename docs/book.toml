[book]
title = "Proxelar Documentation"
authors = ["Emanuele Micheletti"]
description = "Proxelar is a scriptable Rust-native MITM proxy for inspecting, intercepting, replaying, and rewriting HTTP, HTTPS, and WebSocket traffic."
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
git-repository-url = "https://github.com/emanuele-em/proxelar"
edit-url-template = "https://github.com/emanuele-em/proxelar/edit/main/docs/{path}"
